body:
  text: 如是我聞一時佛住王舍城耆闍崛山中與大比丘眾千二百五十人俱皆是諸大聲聞眾所知識名曰憍陳如尊者大目犍連尊者舍利弗尊者迦葉尊者阿難尊者如是等大弟子而為上首諸羅漢名各本或用梵語或用華語今止酌列五尊者以例其餘又有普賢菩薩文殊師利菩薩彌勒菩薩及賢劫中一切菩薩皆來集會此諸菩薩皆具無量行願植眾德本具諸功德行權方便游諸佛國普現一切供養諸佛化導眾生達眾生相通諸法性譬善幻師幻諸男女等相於彼相中實無所得入空無願無相三昧而能具足總持無量百千三昧住深定門悉覩現在無量諸佛於一念中徧游佛土分別眾生語言哀愍如己眷屬誓成諸佛無量功德超諸聲聞緣覺之地此贊菩薩功德一段宋譯無之今從四譯而節其冗詞又有比丘比丘尼五百人清淨優婆塞七千人清淨優婆夷五百人欲界天子八十萬色界天子七十萬徧淨天子六十萬梵天一億如是無量大眾一時雲集此九句各譯無之從漢譯增葢此經普被上中下三根宜首列凡聖男女在家出家四眾以表當機爾時世尊威光赫奕如融金聚又如淨明鏡影暢表裏五句參用魏唐二譯現大光明數千百變此八字依漢吳二譯增尊者阿難即自思惟今日世尊諸根悅豫清淨光顏巍巍寶剎莊嚴我從昔以來所未曾見喜得瞻仰生希有心以上二行參用魏漢二譯即從座起偏袒右肩長跪合掌而白佛言世尊今日入大寂定住甚奇特廣大之法住諸佛所在最勝之道為念過去未來諸佛耶為念現在他方諸佛耶惟願宣說利益一切以上三行參用各譯字句爾時世尊告阿難言善哉善哉阿難汝為哀愍利益諸眾生故能問如是微妙之義哀愍二句用唐譯汝今斯問勝於供養一天下阿羅漢辟支佛布施累劫諸天人民蜎飛蝡動之類功德百千萬倍何以故當來諸天人民一切含靈皆因汝問而得度脫故此段用漢吳二譯阿難如來出世難值難見猶優曇華偶爾一現汝今所問多所饒益我當為汝演說開化一切末七句用魏譯參用各譯字句佛告阿難乃往過去久遠無量不可思議無央數劫有佛出世名世自在王如來住世四十二劫原本由世自在王佛上溯住劫五十二佛與燃燈佛相首尾唐宋二譯俱逆數而上漢吳諸譯則順數而下或謂燃燈為釋迦授記之師不應法藏發心乃在五十三佛之後或謂古佛同名者多無可適從且過去古佛數不勝數既非經誼所關故今闕之即從世自在王起以息疑諍彼佛法中有一比丘名曰法藏本是國王聞佛說法尋發無上真正道意棄國捐王行作沙門智慧勇猛無能踰者詣世自在王如來所頂禮佛足向佛合掌而白佛言此下各本有偈或四字句或五字句或七字句惟吳譯無之今從吳譯唯然世尊我已發無上正覺之心願佛為我廣宣諸佛國淨土莊嚴令我於世得無等覺成大菩提時世自在王佛語法藏比丘莊嚴佛土汝當自攝比丘白佛斯義宏深非我境界唯願世尊為我敷演爾時世自在王佛知其高明志願深廣即為廣說二百一十億諸佛剎土天人善惡國土麤妙應其心願悉現與之時彼比丘聞佛所說嚴淨國土皆悉覩見起發無上殊勝之願其心寂靜志無所著修習功德發大誓願攝取莊嚴具足五劫往詣世自在王佛言我今為菩薩道欲令我後作佛時於八方上下諸無央數佛中智慧光明功德都勝諸佛國者𡩋可得否佛言譬如大海一人斗量經歷劫數尚可窮底人至心求道何願不得以上十二行用魏譯參取吳譯時法藏比丘稽首禮足遶佛三匝合掌而住白佛言世尊我已攝取莊嚴佛土清淨之行唯垂聽察第一願設我得佛國中無三惡道之名設有地獄餓鬼畜生乃至聞其名者不取正覺第二願設我得佛國中天人純是化生無有胎生亦無女人其他國女人有願生我國者命終即化男身來我剎土生蓮華中華開見佛若不爾者不取正覺第三願設我得佛若國中天人形色不同尚有好醜不悉金色身三十二相者不取正覺第四願設我得佛國中天人若不皆識宿命下至知百千億那由他諸劫事者不取正覺第五願設我得佛國中天人不得天眼下至見百千億那由他諸佛國者不取正覺第六願設我得佛國中天人不得天耳下至聞百千億那由他諸佛所說不悉受持者不取正覺第七願設我得佛國中天人不得見他心智下至知百千億那由他諸佛國中眾生心念者不取正覺第八願設我得佛國中天人不得神足於一念頃下至不能超過百千億那由他諸佛國者不取正覺第九願設我得佛國中天人若不得漏盡住滅盡定及決定證大涅槃者不取正覺第十願設我得佛國中天人若不悉得廣長舌說法善巧辯才無礙者不取正覺第十一願設我得佛光明若有限量不徧照百千億那由他諸佛國普勝諸佛光明令彼十方眾生觸此光明身意柔輭罪垢滅除命終皆得生我國者不取正覺第十二願設我得佛壽命若有限量下至百千億那由他劫者不取正覺第十三願設我得佛國中聲聞若有數量乃至三千大千世界眾生悉成緣覺於百千劫悉共計校能知其數者不取正覺第十四願設我得佛國中天人壽命亦皆如佛無有限量永無生死除其本願示現修短自在若不爾者不取正覺第十五願設我得佛國中天人若不皆身具無邊光明照曜諸佛國土者不取正覺第十六願設我得佛名聲普聞十方世界無量諸佛若不悉咨嗟稱歎我名者不取正覺第十七願設我得佛十方眾生聞我名號發菩提心至心信樂欲生我國乃至臨終十念求生若不見佛與大眾圍繞現其人前者不取正覺惟除五逆誹謗正法第十八願設我得佛他方佛土諸菩薩眾來生我國究竟必至一生補處除其本願自在所化為度脫一切眾生故徧遊佛國修菩薩行者雖生他國終不受三途苦永不退失善根若不爾者不取正覺第十九願設我得佛國中天人雖住聲聞緣覺之位而能承佛神力供養諸佛一食之頃若不能徧至無數無量諸佛國者不取正覺第二十願設我得佛國中天人衣服飲食應念所需自然化現在前乃至於諸佛所種種供養香華幢葢瓔珞音樂應念圓滿無所從來無所從去乃至欲求諸佛就供以佛神力應念即得他方諸佛舒臂來此受其供養若不爾者不取正覺第二十一願設我得佛國土清淨皆悉照見十方一切諸佛世界若不爾者不取正覺第二十二願設我得佛國中有無量道場樹高或百千由旬或四百萬由旬諸菩薩欲見諸佛淨國莊嚴悉於寶樹間見猶如明鏡覩其面像若不爾者不取正覺第二十三願設我得佛自地以上至於虗空宮殿樓觀池流華樹國土所有一切萬物皆以無量雜寶百千種香而共合成嚴飾奇妙超諸天人其香普熏十方世界供養諸佛菩薩聞者皆修佛行若不如是不取正覺第二十四願所有他方佛剎聲聞緣覺聞我名號不發大心不得堅固不退轉究竟成就阿耨多羅三藐三菩提者不取正覺魏譯四十八願唐譯四十六願宋譯三十六願惟漢吳二譯皆止二十四願而天親菩薩無量壽偈亦云誓二十四章則西天本同也今遵漢吳以免重複至每願中字句兼取各譯所長以完成善佛告阿難爾時法藏比丘說此願已以偈頌曰我建超世願必至無上道斯願不滿足誓不成等覺我於無量劫不為大施主普濟諸貧苦誓不成等覺我至成佛道名聲超十方究竟有不聞誓不成等覺離欲深正念淨慧修梵行志求無上尊為諸天人師供養一切佛具足眾德本願慧悉成滿得為三界雄如佛無礙智通達靡不照願我功德力等此最勝尊斯願若尅果大千應感動虗空諸天神當雨真妙華此偈漢吳二譯無之唐譯每句七字魏宋二譯每句五字今用魏譯略節數句佛告阿難法藏比丘說此頌已應時普地六種震動天雨妙華以散其上自然音樂空中讚言決定必成無上正覺此用魏譯阿難法藏比丘於其佛所諸天魔梵龍神八部大眾之中發斯宏誓願已一向專志莊嚴妙土所修佛國開廓廣大超勝獨妙於阿僧祇劫修行布施持戒忍辱精進禪定般若六波羅蜜亦教人行六波羅蜜以大莊嚴具足眾行三昧常寂智慧無礙住空無相無願之法無作無起眾法如化此處魏唐宋譯皆有稱頌法藏修行數十句皆不出六波羅蜜之內今用漢吳二譯較簡括其莊嚴以下六句兼取魏譯或為長者居士豪姓尊貴或為剎利國王轉輪聖帝或為六欲天主乃至梵王常以四事供養恭敬諸佛由成就如是諸善根故隨所生處有無量寶藏自然涌出身諸毛孔出無量香普熏世界無量眾生聞之皆發阿耨多羅三藐三菩提心於一切法而得自在所說諸願皆悉得之此參取各譯字句現在西方去閻浮提十萬億佛剎有世界名曰極樂佛名無量壽佛成佛以來於今十劫有無量無數菩薩聲聞圍繞說法又一向出生菩薩經佛言我念過去無量阿僧祗劫有佛號寶功德威宿劫王彼佛將入涅槃為眾廣說法本陀羅尼時有輪王名曰持火王有太子名曰不思議勝功德生年十六從彼如來聞是法本即于七萬歲中精勤修習未曾睡眠亦不偃側端坐一處不貪財寶及以王位不樂自身得值九十億百千那由他佛諸佛說法盡能聞持修習厭家薙髮而作沙門復于九萬歲中修習此陀羅尼復為眾生分別顯示一生之中力精教化令八十億百千那由他眾生得發道心至不退地爾時不思議勝功德比丘豈異人乎即阿彌如來是也此明法藏所修本行足與經文互證阿難彼佛所放光明照徧東方恒沙佛剎南西北方四維上下亦復如是若化頂上圓光或一二三四由旬或百千由旬或億萬由旬或照一二佛剎百千佛剎乃至徧照無量無邊無數佛剎光明遠近不同處漢吳二譯皆指他方諸佛魏唐二譯亦同惟宋譯屬阿彌陀佛自身圓光隨意大小最為得之葢放光與圓光不同諸佛成道說法未有不放光照大千世界者豈有十方佛光拘止尋丈之理至阿彌陀佛化身接引眾生則光亦有大小隨其所現庶不礙諸佛功德平等之誼是故無量壽佛亦名無量光佛如是光明普照十方一切世界其有眾生遇斯光者垢滅善生身意柔輭若在三途極苦之處有緣見此光明皆得休息命終皆得解脫若有眾生聞其光明功德日夜稱說至心不斷隨意所願得生其國無量光下各本尚有十二種光明佛號皆攝於無量之中今節去以省重複眾生遇光以下用漢吳二譯復次阿難無量壽如來有無量無數聲聞之眾譬喻算數所不能及阿難彼大目乾連神通第一三千大千世界所有一切星宿眾生於一晝夜悉知其數假使百千萬億聲聞神通之力皆如大目乾連一一聲聞壽百千萬億歲盡其壽命數彼聲聞百分之中不及一分復次阿難譬如大海深八萬四千由旬廣闊無邊假使有人出身一毛碎為百分細如微塵以一毛塵沾海一滴此毛塵水較海孰多阿難彼目乾連等聲聞之眾盡其形壽所知數者如毛塵水所未知者如大海水以上各譯略同其字句用魏宋二譯彼佛及諸菩薩壽量劫數亦復如是此壽量句用唐譯增又其國土七寶諸樹周滿世界金樹銀樹瑠璃樹玻瓈樹真珠樹硨磲樹瑪瑙樹或有二寶三寶四寶五寶六寶七寶轉共合成根莖枝榦此寶所成華葉果實他寶化作或有寶樹黃金為根白銀為身瑠璃為枝玻瓈為梢真珠為葉硨磲為華瑪瑙為果其餘諸樹諸寶展轉相互亦復如是行行相望枝枝相對葉葉相當各譯皆將每樹根柯枝葉華果與七寶展轉互配演成七段過於繁悉無關佛法今省并之末三句用魏漢譯增又無量壽佛國其道場樹高四百萬里其本周圍五千由旬枝葉四布二十萬里一切眾寶自然合成珍妙寶網羅覆其上微風吹動演出無量妙法音聲流徧國中若有眾生覩菩提樹聞聲齅香嘗其果味觸其光影念樹功德皆得五根清淨住不退轉至成佛道道場樹一段宋譯無之此用魏唐譯本復次阿難彼佛國土清淨嚴飾寬廣平正無有丘陵坑坎荊棘沙礫土石等山黑山雪山寶山金山須彌山鐵圍山大鐵圍山惟以黃金為地爾時阿難聞是語已白世尊言若無須彌山其四天王天忉利天依何而住佛語阿難四禪天色究竟天依何而住當知眾生業因果報不可思議諸佛神力亦不可思議此段魏唐宋三譯略同彼佛國淨土本無人天之別惟順餘方示有三界人天三界四句宋譯無之此從魏唐譯增入復次阿難彼佛國土雖無大海而有泉池處處交流其水深廣或十由旬二十由旬三十由旬乃至百千由旬其水清淨具八功德又水兩岸復有無數栴檀香樹吉祥果樹華卉恒芳光明照曜若彼眾生過浴此水時要至足者要至膝者乃至要至頂者或要冷者溫者急流者慢流者其水一一隨眾生意令受禪定之樂其寶池中純是蓮華有他方眾生來生其國者即於蓮華中自然化生結跏趺坐又於水中出種種聲佛法僧聲止息聲無性聲波羅蜜聲十力四無所畏聲神通聲無作聲無生無滅聲寂靜聲大慈大悲聲喜捨聲灌頂受記聲眾生聞如是種種聲已其心清淨與聲中所說法相應無諸分別成熟善根永不退於阿耨多羅三藐三菩提心其有不願聞聲者即如定中一無所聞此段全用宋譯惟蓮華化生四句及不願聞聲二句宋譯無之從漢唐二譯增復次阿難彼國菩薩或於晨朝欲供諸佛思香華等作是念時華香瓔珞幢幡網葢及諸伎樂隨意即至其所散華即於空中結成華葢或十由旬或數十百千由旬乃至徧覆三千大千世界供養諸佛已即於晨朝還到本國若思飲食湯藥衣服臥具等亦復如是此諸菩薩所需之食實無食者但見色聞香以意為食身心柔輭無所味著事已化去時至復現其香味或有不欲聞者即無所聞此段參用唐宋魏三譯又復思念摩尼寶等莊嚴及宮殿樓觀堂宇房閣或大或小或高或下或處虗空或在平地或依寶樹而住隨意所現無不具足此段用宋譯惟虛空平地二句從漢譯增其諸菩薩阿羅漢各自行道中有在地講經誦經者有在地受經聽經者有在地經行者思道者及坐禪者有在虗空講經誦經者有在虗空受經聽經者有在虗空經行者思道者及坐禪者中有未得須陀洹道者則得須陀洹道未得斯陀含道者則得斯陀含道未得阿那含道者則得阿那含道未得阿羅漢道者則得阿羅漢道未得阿惟越致者則得阿惟越致各自行道莫不自在此段用漢譯增又各譯有乞人不如帝王帝王不如輪王輪王不如忉利諸天展轉相倍不如無量壽國云云一段但或贊宮殿或贊威勢或贊菩薩容貌各本互異無所適從且非義諦所關故舍彼取此較於行人觀心有益復次阿難彼佛國土每於晨食時香風自起吹動寶樹寶網自觸出微妙音演說苦空無常無我諸波羅蜜其有聞者塵勞垢習自然不起風觸其身如比丘得滅盡定復吹樹華落放地上徧滿佛土隨色次第而不雜亂輭妙如兜羅綿足履其上蹈下四寸隨足舉已復還如故過一時後其華自然沒入於地隨其時節復雨新華一日之中如是六反此段字句參用魏唐宋譯復次阿難彼佛國土復有眾鳥住虗空界出種種音猶如佛聲說法普聞世界皆是佛力化作非實畜生化鳥七句各譯無之今從唐譯但彼在下文今移於此復次阿難彼佛國土無有日月星曜晝夜之象亦無劫數之名亦無山川高下林苑家室於一切處既無標示亦無名號亦無取舍分別此段字句參取諸譯惟有眾寶蓮華周滿世界一一寶華百千億葉其華光明無量種色青色青光白色白光黃色黃光紫色紫光一一華中出三十六百千億光一一光中出三十六百千億佛一一諸佛又放百千光明普為十方說微妙法各各安立眾生於佛泥洹之道此段宋譯無之用魏唐譯增復次阿難不獨我今稱贊阿彌陀佛光明功德東方過恒河沙數世界諸佛如來亦各出廣長舌相放無量光說誠實言稱讚無量壽佛不可思議功德西方南方北方恒河沙數世界諸佛亦復如是四維上下恒河沙數世界諸佛亦復如是何以故欲令眾生聞彼佛名發清淨心憶念受持歸依供養求生彼界得不退轉故此段用宋譯與魏唐各譯大同小異復次阿難十方世界諸天人民其有至心願生彼國凡有三輩其上輩者舍身出家而作沙門發無上菩提之心一向專念無量壽佛修諸功德願生彼國此等眾生臨壽終時無量壽佛與諸大眾現其人前即隨彼佛往生其國便於七寶華中自然化生住不退轉應時即得智慧神通自在其中輩者十方世界諸天人民其有至心願生彼國雖不能行作沙門大修功德當發無上菩提之心一向專念無量壽佛多少修善奉持齋戒供養三寶以此回向願生彼國其人臨終無量壽佛化現其身光明相好具如真佛與諸大眾現其人前即隨化佛往生其國住不退轉功德智慧次於上輩者也其下輩者十方世界諸天人民其有至心欲生彼國假使不能作諸功德當發無上菩提之心一向專意乃至十念念無量壽佛願生其國若聞法歡喜信樂不生疑惑乃至一念念於彼佛以至誠心願生其國此人臨終夢見彼佛亦得往生功德智慧次於中輩者也此段全用魏譯較唐宋譯文義完善此三輩當觀經上中二品而無其下三品佛告阿難彼國菩薩皆當究竟一生補處除其宿願為眾生故以大宏誓入生死界度脫有情隨意而作佛事阿難彼佛國中諸聲聞眾身光一尋菩薩光明照百由旬或千由旬又有二菩薩最尊第一光明普照三千大千世界阿難白佛彼二菩薩其號云何佛言一名觀世音一名大勢至此二菩薩現居此界作大饒益攝念佛人生彼佛國阿難其有眾生得生彼國其鈍根者見佛聞法成就二忍其利根者得不可計無生法忍又彼菩薩乃至成佛不受惡趣神通自在除以宿願生他方五濁惡世示現同彼常識宿命此段全用魏譯而參取各譯字句又此下各本有贊彼國菩薩功德數百言宋譯已省其三分之二今全省之至此下漢吳魏譯皆有佛告彌勒勸進往生及五痛五燒數干言繁冗複沓不類佛語唐宋二譯皆無之今從後二譯阿難汝起面西頂禮爾時阿難即從座起合掌面西頂禮五體投地白佛言我今願見極樂世界無量壽佛供養禮拜種諸善根即時無量壽佛於其掌中放無量光普照一切諸佛世界於此世界所有黑山雪山金山寶山目真鄰陀山須彌山鐵圍山大海江河叢林樹木及天人宮殿一切境界無不照見譬如日出明照世間亦復如是聲聞菩薩一切光明皆悉隱蔽爾時會中天龍八部人非人等皆見極樂世界種種莊嚴及見無量壽如來聲聞菩薩圍繞恭敬譬如須彌山王出於大海爾時極樂世界過於西方百千俱胝那由他國以佛威力如對目前彼見此土亦復如是爾時世尊告彌勒菩薩言汝見極樂世界從地以上至色究竟天諸莊嚴否汝聞無量壽佛大音演說妙法宣布一切佛剎化眾生否汝見彼國眾生游處虗空宮殿隨意否或徧至十方供養諸佛否彌勒菩薩白佛言世尊如佛所說一一皆見以上全用宋譯間取各譯一二字句世尊云何彼土眾生亦有宮殿處地不能游行虗空神通自在者耶佛言此乃彼國化城邊地眾生由彼在世時不了諸佛不思議智大乘廣智最上勝智但信罪福修習善本願生其國此人命終時生彼國邊界七寶城中其城縱廣各二千里城中亦有舍宅寶樹寶池供養如第二忉利天其人於其城中凡五百歲不能游行虗空不能見佛聞法譬如轉輪聖王有七寶牢獄若諸小王子得罪幽此宮中衣食供帳伎樂如轉輪王而以金鎖繫其兩足此諸王子𡩋樂處彼否彌勒言不也但以種種方便求出佛告彌勒此諸眾生亦復如是又如此土眾生處母胎中尚未出胎一切無所見聞此等眾生亦復如是雖處華胎而不能見佛聞法與此土處胎無異由其宿命所種善根不能離相不求佛慧妄生分別視生佛國如求人天福報是故因果相感生此化城雖有餘樂而以不見佛為苦待彼眾生久知悔責求離彼處乃能往詣無量壽佛所供養聞法既聞法開悟已乃得徧至諸佛世界所修其功德此等眾生暫離三界輪回信慧未全尚復如是況乃世智聰辯取相分別情執深重但求人天福田增益邪心永在三界獄中云何得免輪回出離生死此段參取魏唐二譯其漢吳文亦相仿惟宋譯不指邊地化城而指生天為胎生則天上亦係化生且佛與彌勒問答語氣亦太淺近故不從之惟末數句略參取其意又案菩薩處胎經云佛言過此西方十二億那由他剎有懈慢國快樂安隱人欲徃生阿彌陀佛國若從此國過人多染著即願生其中遂不得到彌陀佛土若人見此不貪不愛即得越過至安樂國又寶積經有一比丘聞佛贊揚東方不動如來佛剎功德心生貪著而白佛言我今願生不動佛剎佛告比丘彼國不以愛著而得徃生惟有植諸善本修諸梵行得生彼國此二經皆可與此相證即十六觀經之下品徃生不得見佛也此經三輩往生皆上中品而以下品屬疑城邊地彌勒當知眾生在此五濁惡世精進一日一夜勝在天上為善百歲所以者何天上多樂少苦故在此忍界精進十日十夜勝在他方佛國邊地為善千歲所以者何佛界邊地多樂少苦故此段各譯相仿惟此土為善勝於極樂也世界當指疑城邊地言之諸譯未免以辭害意故酌增邊地二字彌勒菩薩白佛言世尊今此娑婆世界及諸佛剎有幾多菩薩得生極樂世界佛言彌勒我此娑婆世界有七十二那由他菩薩已曾供養無量壽佛植眾德本當生彼國其諸小行菩薩修習小功德當來得往生者不可勝計復次阿難難忍佛剎有十八億菩薩生彼國土寶藏佛剎有九十億菩薩生彼國土火光佛剎有二十二億菩薩生彼國土無量光佛剎有二十五億菩薩生彼國土世燈佛剎有六十億菩薩生彼國土龍樹佛剎有千四百億菩薩生彼國土無垢光佛剎有二十五億菩薩生彼國土師子佛剎有千百八億菩薩生彼國土吉祥峰佛剎有二千百億菩薩生彼國土仁王佛剎有千億菩薩生彼國土華幢佛剎有一億菩薩生彼國土光明王佛剎有十二億菩薩生彼國土得無畏佛剎有六十九億菩薩生彼國土此外十方世界無量佛國其往生者亦復如是晝夜一劫說不能盡此段全用宋譯惟末四句從魏譯增若有善男子善女人得聞無量壽佛名號深心信樂至誠歸依無所疑惑當知此人夙世已曾於諸佛所種諸善根非是小乘若於此經典書寫供養受持讀誦為他演說乃至於一晝夜思惟彼剎及佛身功德此人命終假使三千大千世界滿中大火亦能超過生彼國土是人已曾值過去佛受菩薩記一切如來同所稱讚無上菩提隨意成就此段用宋譯參取各譯字句佛語彌勒我悲此土眾生盡其形壽為心走使無田宅憂田宅無財寶憂財寶無眷屬憂眷屬適然得之又憂非常水火盜賊怨家債主焚漂劫奪日夜怔營無有休息身亡命終棄捐之去莫誰隨者又或於所怨仇更相報復於所恩愛互相貪戀世世轉劇或父哭子或子哭父兄弟夫婦更相哭泣惟己之神識獨生獨死獨往獨來苦樂自當無有代者或有勉修福田情執深重但求人天有漏果報祇增生死不出輪回永劫以來流轉五道憂畏勤苦不可勝言變化殃咎異處善惡自然追逐去無所至𥥆𥥆冥冥別離久長道路不同會見無期甚難甚難此皆不了佛智不信佛語不拔生死輪回根本迷沒愚癡苦海無有出期當知眾生處此五濁惡世長受五痛五燒於諸世界中最可憐愍何謂五濁劫濁命濁見濁眾生濁煩惱濁是為五濁何謂五痛五燒生時痛老時痛病時痛死時痛患難窮苦痛淫欲火燒瞋忿火燒貪盜火燒邪偽火燒愚癡火燒是為五痛五燒我今於此五濁惡世成佛勸導眾生出五濁離五痛斷五燒說此易行難信之法是為甚難當知眾生或聞無量壽佛名號悲悚信樂深心歸依者皆是夙種善根已曾供養諸佛若有聞無量壽佛名號不敬不信不樂受持者皆是惡道中來不種善根所致漢吳魏三譯皆有佛告彌勒勸進徃生及五痛五燒等數千言唐宋二譯皆無之固較簡淨但於我佛悲心苦口覺迷之旨又恐有缺考漢吳譯均有生老病死苦五痛之語竊意當初佛說五痛不過如此後人展轉附益故失其真今故於前三譯中決擇精粗存此一段以資持誦而起悲信惟中間人天福田五句各譯無之今采宋譯增入佛語彌勒如來出世難值難見諸佛經法難得難聞若聞此經信樂受持難中之難無過此難當來之世經道滅盡我以慈悲哀愍特留此經止住百歲其有眾生值斯經者隨意所願皆可得度此段全用魏譯過是以往無量壽經亦滅惟餘阿彌陀佛四字廣度羣生此四句各譯無之今從大集經增入使人知此淨土法門為末法第一津梁且使人免法滅之懼又瑜珈師地論云劫盡之時阿彌陀佛四字世間無能念全或能一字或能二字若有能念全四字者即為天人師是知法愈末則根愈鈍又法苑珠林言餓鬼地獄有菩薩憫之教以念佛皆不成聲或以佛號寫其手掌字不能現是知業障愈重則信受愈難故人身難得佛法難聞況淨土橫超三界至易簡至難信佛經末丁甯告戒以難中之難無過此難讀者當發深慶幸深悲恐方不負金口囑付之苦心也汝等當受持我語廣流末法毋令斷絕爾時世尊說此經已無量眾生皆發無上正覺之心萬二千那由他人得清淨法眼二十二億諸天人民得阿那含果八百比丘漏盡意解四十億菩薩得不退轉以宏誓功德而自莊嚴於將來世當成正覺爾時三千大千世界六種震動光明普照十方國土百千音樂自然而作無量妙華雨滿虗空佛說是經已尊者阿難及彌勒菩薩天龍八部一切大眾皆大歡喜信受奉行此用魏宋二譯觀無量經敘蓮池大師之不疏十六觀經以有智者之疏四明尊者之鈔也天台以三觀三諦釋一切經而於是經尤切一心三觀者為能觀一境三諦者為所觀然即佛即心即心即境則所即是能能即是所初無彼此之別台宗一色一香無非中道所謂即妄全真況我佛依正無上勝境乎但在行人根器不同修持有序則有次第三觀一心三觀之別次第三觀者從空入假從假入空從空入中此經先觀依正日水冰地寶樹樓臺以漸及觀金容因以漸契心源也一心三觀者即假即空即中諸佛正徧知海從心想生故行者觀佛時此心即是三十二相八十相好則無次第之可言矣徹悟禪師語錄曰觀經是心作佛是心即佛此言較之宗門見性成佛尤為直捷何者以成佛難而作佛易也見佛時即成佛時知此則以彌陀之自性念自性之彌陀以淨土之惟心念惟心之淨土而淨業純是第一義諦矣古德曰諸佛心內眾生塵塵極樂眾生心內諸佛念念證真自非用志不分絕利一源者豈易語此哉但需依經次第諦審觀境如對目前自然定中夢中默為感應心境圓融入不思議略述指歸以告持誦是經者菩薩戒弟子魏承貫謹敘問觀佛依正之時不可念佛號乎曰是何言也如落日蓮華此方所有觀之易現至于觀水觀冰不過江河湖蕩之水已難成天水相接琉璃世界之象況七寶之樹八功德之水若非求佛加被于夢寐之中現之豈凡夫心想所能現乎至于觀三聖金容之時則觀佛之日必須終日念佛名觀二大士之日必須終日念二大士之名是觀佛念佛兩不可離也念佛在一心不亂今口中念佛而心觀依正並非二用其心也問觀佛不至有魔而各觀皆防邪觀者何也曰此非邪魔之謂如觀水冰而現落日觀寶樹而現蓮華所現與所觀不相應不得即以為正觀也觀經于觀佛法門備極婆心恐相好太多眾生無由入也則教以從一相好入先觀眉間白毫又恐佛法界身非凡夫心力所能攝也則教以先觀丈六金身立池水上至于普觀想此身生于西方極樂世界蓮華中趺坐華開見佛徧覧依正此則在前此白毫丈六兩觀既成之後非上上根器不得見此有能以法界性觀法界身者則心可契此矣魏承貫謹記阿彌陀經敘彌陀一經得雲棲大師疏鈔可謂大涌細入盡美盡善矣大師以乘願再來之人為淨業中興教主後學仰鑽不暇何敢置議惟科判太多初心難入故為疏鈔節要刪繁就簡于大師之精華實一字不遺焉夫念佛之聲或默持或金剛持或經行閉關時持其聲至近也去阿彌陀佛極樂世界十萬億剎外豈能得聞乃念者往生不念者不得往生豈非無邊剎海自他不隔于毫端乎又念佛之念惟自知之何故一心不亂者往生散心不一者不得往生豈非十世古今始終不離于當念乎蕅益大師彌陀要解自十方佛贊以後即判為流通良為直捷可以並行惟其弟子成時作淨土十要序專主持名而斥觀想參究之非其言譬如魘人不可照以燈燭照則失心止宜喚其本名自然醒寤夫魘人待他人喚醒與醒人之觀佛依正即心即佛者何可同年而語又斥參究之人曰纖兒得些活計急須吐棄無餘此謂參念佛是誰話頭難起疑情故有是詞若其他話頭公案多可逆流而入直徹真源者上品上生即契無生法忍上品中生亦必契第一義諦雲棲師禪關䇿進以制心一處無事不辦為參究之要其疏鈔中言言歸性昔有人問雲棲師者曰參禪與念佛二事還可通融否師應聲曰若言是兩事用得通融著請舉之以告持誦是經者菩薩戒弟子魏承貫謹敘雲棲法彚或問一心不亂有理一心有事一心倘但得事一心未得理一心何如曰但得事一心亦必往生又問未得事一心何如曰不得事一心難以往生有但念阿彌陀佛四字者有念南無阿彌陀佛六字者然當閉關觀佛之時若念南無西方極樂世界阿彌陀佛十二字尤尊重而心易專蓋世人不解阿彌陀三字何義念之易生玩故須念十二字提醒之苦樂明則欣厭易生也夜眠默念較旦晝尤心易專初念時或夢穢垢恐怖以心未一則境不淨也久念則夢見佛境或惺惺無夢是心一而境淨也夢寐時尚做不得主而生死大事當前能自主者未之有也故一心念佛者先驗過夢覺關而生死關不必問矣旦晝所念一不一皆于夢寐徵之夢者心之影也魏承貫謹記普賢行願品敘普賢菩薩行願品乃華嚴一經之歸宿非淨土一門之經也華嚴以華藏世界海諸佛微塵國無量無邊明心佛之無盡何嘗專指極樂然清涼疏分信解行證而自入法界品下普賢告善財五十三參徧游佛國得無量法門皆證道之實而末後獨以十大願王導歸極樂者葢以經十大願末皆結曰念念相續無有間斷身語意業無有疲厭則是併法界微塵數佛微塵數眾生而念之也人以為念盡法界微塵之生佛卒歸于彌陀而不知自性彌陀之一心本周乎法界雲棲所謂傾華藏海水入西方一蓮華中曾不滿蓮之一蕊也盡法界為一念故為念中之王修淨土而不讀行願品則其教偏而不圓故以殿四經之末為淨土之歸宿葢念佛人至一心不亂則千念萬念并為一念猶之煉乳出酪也由一心之淨而更念至於即假即空即中離四句絕百非是事一心入理一心猶從酪出酥也從一念佛法門徧通華藏海一切法門一即一切一切即一此從酥出醍醐也世之以宗教輕淨土者曷一誦普賢十大願王乎菩薩戒弟子魏承貫謹敘重刊淨土四經䟦予初聞佛法惟尚宗乘見淨土經論輙不介意以為著相莊嚴非了義說及見雲棲諸書闡發奧旨始知淨土一門普被羣機廣流末法實為苦海之舟航入道之階梯也無如兵燹之餘僅見小本彌陀經而於大本無量壽經及十六觀經迄不可得適來金陵獲見此本於王君梅叔處覔之數年者一旦得之喜出望外此本為邵陽魏公默深所輯魏公經世之學人所共知而不知其本源心地淨業圓成乃由體以起用也世緣將盡心切利人遂取無量壽經參會數譯刪繁就簡訂為善本復以十六觀經及阿彌陀經普賢行願品合為一集名曰淨土四經使世之習淨業者但受此本無不具足自逆匪竄擾以來其板想不復存今者廣募信施重鋟梨棗庶幾魏公一片婆心末學咸受其惠伏願世間修佛乘者毋於淨土便生輕慢須信念佛一門乃我佛世尊別開方便普度羣生之法倘不知其義旨深微但能諦信奉行自有開悟之期知其義者正好一心迴向萬行圓修轉五濁為蓮證彌陀於自性是則予之所厚望焉同治五年佛成道日淨業弟子楊文會謹䟦
