front:
  text: 原刻淨土四經敘余友邵陽魏默深源精通宗教晚歲專心淨業六年春自秦郵馳書問訊并手録四經序而見貽書云老年兄弟值此難時一切有為皆不足恃惟此橫出三界之法乃我佛願力所成但辦一心終登九品且此念佛法門普被三根無分智愚男女皆可修持若能刊刻流布利益非小子其力行毋怠余謹受教惟底本為默深病中所録頗有魚豕之訛余藏書既鮮陋處海隅又無善本可以借校屢刻屢改兩易寒暑始克竣事校刊竟因書其緣起於卷端經序皆署承貫名蓋默深戒法名也咸豐八年歲次戊午仲秋之吉湘潭信士周詒朴熏沐謹記淨土四經總敘世宗憲皇帝御選語録輯蓮池大師淨土諸語御製序文闡揚宗淨合一之旨高宗純皇帝南巡親詣雲棲拈香禮佛御製詩有由來六字括三乘之句大矣哉西方聖人之教得東方聖人而表章乎夫王道經世佛道出世滯迹者見為異圓機者見為同而出世之道又有宗教律淨之異其內重己靈專修圓頓者宗教也有外慕諸聖以心力感佛力者淨土也又有外慕諸聖內重己靈者此則宗淨合修進道尤速至律則宗教淨之基址而非其究竟焉然宗教律皆發心童真出家動經久劫由初地至十地方稱等妙覺即不蒙佛記亦自成佛此是何等根器但從無一生了辦之法此我佛無量壽世尊淨土往生之教橫出三界較豎出三界者其難易遠近有霄壤之分此永明壽禪師所謂有禪無淨土十人九錯路無禪有淨土萬修萬人去有禪有淨土猶如戴角虎也雲棲師中興淨土乃專宏小本彌陀而于大本無量壽經及十六觀經普賢行願品皆不及焉夫不讀無量壽何以知法藏因地願海之宏深與果地之圓滿不次以十六觀經何以知極樂世界之莊嚴與九品往生之品級大心既發觀境親歷然後要歸于持名非可以持名而廢發願觀想也持名至一心不亂決定往生而後歸宿于普賢行願品以十大願王括無量壽之二十四願以每願末念念相續無有間斷身語意業無有疲厭括彌陀經之一心不亂故現宰官長者居士身者持誦是四經熟讀成誦之後依解起行須先發無上菩提之心大之則無邊煩惱誓願斷無盡衆生誓願度無量法門誓願學無上佛道誓願成邇之則廣行布施供養三寶多刊大乘經典及淨土諸經論使叢林皆于禪堂外別開念佛堂使出家者皆往生西方固極順之勢即在家白衣未悉朝聞夕死之義驟覩四經未必聽受然疑佛謗佛皆種信根況蠢動含靈固皆具佛性乎夫勸化一人成佛功德無量況勸化數十百僧展轉至千百萬皆往生西方成佛功德可思議乎古德有言己先自度而後度人者如來應世未能自度先願度人者菩薩發心然後閉七日念佛之關以求一心不亂再閉七日觀佛之關以求親見西方極樂依正蓋入門必次第修而後圓修圓莫圓于普賢行願品故為華嚴之歸宿矣此天然之次第修持之定軌故合刊四經以廣流通普與含靈同躋正覺咸豐四年菩薩戒弟子魏承貫謹敘無量壽經會譯敘蓮池大師舍大本彌陀及觀經而專宗小本彌陀固已偏而不全矣及雲棲法彚刊大本彌陀經又專用魏譯且謂四十八願古今流通夫天親菩薩無量壽偈已言誓二十四章是西域古本如是故漢吳二譯宗之為二十四願自魏譯敷衍加倍重復沓冗前後雷同是以唐譯省之為四十六願宋譯省之為三十六願是古不流通今亦不流通也加之五痛五燒冗復相等惟寶積經唐譯無之故無量壽經至今叢林不列于日課使我佛世尊因該果海果徹因源之大願不章于世豈非淨土經教之大憾哉謹會數譯以成是經無一字不有來歷庶幾補雲棲之缺憾為法門之善本矣或謂據子別本經注仿雲棲彌陀疏一一銷歸自性且愛不盡不出娑婆彼玻瓈硨磲珊瑚瑪瑙黃金白銀真珠寶樹樓閣瓔珞天樂何預性分中事而經言極樂世界津津道之者何曰此法身報化之自然也娑婆世界本華藏世界第十三重衆生視為坑坎土石者世尊以神足躡之立地皆為琉璃寶地及攝神足還復如故此生佛因果之異感也衆生無不有六根有六根即有六塵六入是以目欲極天下之色耳欲極天下之音舌欲極天下之味鼻欲極天下之香身欲極天下細滑之觸心欲極天下快意之法其求而得之者為諸天福報不知天福享盡之易墮也其次為人道人道終身為形骸妻子所役苦樂相半且富貴溺人易入三途也在家之難如此即出家之僧宗教二門自智者永明宗淨合修而外餘皆大乘自命欲由初地以登十地動經長劫且菩薩有隔陰之迷雲門青草堂五祖戒其前車之鑒此豎出三界之所以難也是以大聖覺王憫之故于豎出三界之外創橫出三界之法即妄全真會權歸實攬大海水為醍醐變大地為黃金一聲喚醒萬德洪名人人心中有無量壽佛放光動地剖塵出卷自衣獲珠乃知欲為苦本欲為道本欣不極則厭不至厭不極則三界不得出如是嚮往如是取舍如是出離而後一禮拜一觀想一持名念念仰彌陀如慈父如疾苦之呼天如逃牢獄而趨寶所雖欲心之不專不可得矣不然者口持洪名心懸世樂欲其竟出三界也不亦難哉菩薩戒弟子魏承貫謹敘
